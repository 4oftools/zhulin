<div class="app-container">
  <header class="app-header">
    <div class="header-content">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon" appSvgIcon="assets/icons/navigation/logo.svg"></span>
          <h1 class="logo-text">竹林工作法</h1>
        </div>
        <nav class="main-nav">
          <a routerLink="/dashboard" routerLinkActive="active">
            <span class="nav-icon" appSvgIcon="assets/icons/navigation/dashboard.svg"></span>
            <span>大屏展示</span>
          </a>
          <a routerLink="/strategic" routerLinkActive="active">
            <span class="nav-icon" appSvgIcon="assets/icons/navigation/strategic.svg"></span>
            <span>战略管理</span>
          </a>
          <a routerLink="/tactical/activities" routerLinkActive="active">
            <span class="nav-icon" appSvgIcon="assets/icons/navigation/tactical.svg"></span>
            <span>战术管理</span>
          </a>
        </nav>
      </div>
      <div class="header-right">
        <div class="user-section">
          <div class="user-info" *ngIf="isLoggedIn">
            <span class="user-avatar">{{ userName.charAt(0) }}</span>
            <span class="user-name">{{ userName }}</span>
            <button class="btn-logout" (click)="logout()" title="退出登录">退出</button>
          </div>
          <button class="btn-login" *ngIf="!isLoggedIn" (click)="login()">登录</button>
        </div>
      </div>
    </div>
  </header>
  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
</div>
