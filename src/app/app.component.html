<div class="app-container">
  <mat-toolbar color="primary" class="app-header">
    <div class="header-content">
      <div class="header-left">
        <div class="logo">
          <div class="logo-icon-wrapper">
            <mat-icon class="logo-icon">eco</mat-icon>
          </div>
          <span class="logo-text">竹林工作法</span>
        </div>
        <nav class="main-nav">
          <a mat-button routerLink="/dashboard" routerLinkActive="active" class="nav-item">
            <div class="nav-icon-wrapper">
              <mat-icon>dashboard</mat-icon>
            </div>
            <span>大屏展示</span>
          </a>
          <a mat-button routerLink="/strategic/forests" routerLinkActive="active" class="nav-item">
            <div class="nav-icon-wrapper">
              <mat-icon>track_changes</mat-icon>
            </div>
            <span>战略管理</span>
          </a>
          <a mat-button routerLink="/tactical/activities" routerLinkActive="active" class="nav-item">
            <div class="nav-icon-wrapper">
              <mat-icon>flash_on</mat-icon>
            </div>
            <span>战术管理</span>
          </a>
        </nav>
      </div>
      <div class="header-right">
        <div class="user-section">
          <button mat-icon-button [matMenuTriggerFor]="userMenu" *ngIf="isLoggedIn">
            <mat-icon>account_circle</mat-icon>
          </button>
          <mat-menu #userMenu="matMenu">
            <div class="user-menu-header">
              <mat-icon>account_circle</mat-icon>
              <span>{{ userName }}</span>
            </div>
            <mat-divider></mat-divider>
            <button mat-menu-item (click)="logout()">
              <mat-icon>exit_to_app</mat-icon>
              <span>退出登录</span>
            </button>
          </mat-menu>
          <button mat-raised-button color="accent" *ngIf="!isLoggedIn" (click)="login()">
            <mat-icon>login</mat-icon>
            <span>登录</span>
          </button>
        </div>
      </div>
    </div>
  </mat-toolbar>
  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
</div>
