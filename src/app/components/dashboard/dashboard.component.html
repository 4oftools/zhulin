<div class="dashboard-container">
  <div class="dashboard-header">
    <h2>工作概览</h2>
    <p class="subtitle">实时掌握你的工作进度</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon forests">
        <img src="assets/icons/dashboard/forests.svg" alt="竹林总数" />
      </div>
      <div class="stat-content">
        <h3>{{ stats.totalForests }}</h3>
        <p>竹林总数</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon fields">
        <img src="assets/icons/dashboard/fields.svg" alt="竹田总数" />
      </div>
      <div class="stat-content">
        <h3>{{ stats.totalFields }}</h3>
        <p>竹田总数</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon bamboos">
        <img src="assets/icons/dashboard/bamboos.svg" alt="竹子总数" />
      </div>
      <div class="stat-content">
        <h3>{{ stats.totalBamboos }}</h3>
        <p>竹子总数</p>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-icon tasks">
        <img src="assets/icons/dashboard/tasks.svg" alt="任务总数" />
      </div>
      <div class="stat-content">
        <h3>{{ stats.totalTasks }}</h3>
        <p>任务总数</p>
      </div>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-card">
      <h3>任务完成率</h3>
      <div class="progress-circle">
        <div class="progress-value">{{ stats.completionRate }}%</div>
        <svg class="progress-ring" width="120" height="120">
          <circle class="progress-ring-circle-bg" cx="60" cy="60" r="54"></circle>
          <circle class="progress-ring-circle" 
                  cx="60" cy="60" r="54"
                  [style.stroke-dasharray]="getProgressDashArray()"
                  [style.stroke-dashoffset]="getProgressDashOffset()"></circle>
        </svg>
      </div>
    </div>

    <div class="task-status-card">
      <h3>任务状态分布</h3>
      <div class="status-list">
        <div class="status-item completed">
          <div class="status-bar" [style.width.%]="stats.totalTasks > 0 ? (stats.completedTasks / stats.totalTasks * 100) : 0"></div>
          <span class="status-label">已完成</span>
          <span class="status-count">{{ stats.completedTasks }}</span>
        </div>
        <div class="status-item in-progress">
          <div class="status-bar" [style.width.%]="stats.totalTasks > 0 ? (stats.inProgressTasks / stats.totalTasks * 100) : 0"></div>
          <span class="status-label">进行中</span>
          <span class="status-count">{{ stats.inProgressTasks }}</span>
        </div>
        <div class="status-item pending">
          <div class="status-bar" [style.width.%]="stats.totalTasks > 0 ? (stats.pendingTasks / stats.totalTasks * 100) : 0"></div>
          <span class="status-label">待办</span>
          <span class="status-count">{{ stats.pendingTasks }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
