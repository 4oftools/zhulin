<div class="container">
  <div class="card">
    <h2>制定计划</h2>
    <p class="duration">时长：10分钟</p>
    <div class="form-group">
      <label>计划内容：</label>
      <textarea [(ngModel)]="planContent" rows="10" placeholder="记录你的计划..."></textarea>
    </div>
    <button class="btn btn-primary" (click)="savePlan()">保存计划</button>
  </div>
</div>
