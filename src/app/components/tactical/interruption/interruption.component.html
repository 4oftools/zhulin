<div class="container">
  <div class="card">
    <h2>记录打断</h2>
    <p>当前竹节被打断，请记录打断原因</p>
    <div class="form-group">
      <label>打断原因：</label>
      <textarea [(ngModel)]="interruptionReason" rows="5" placeholder="描述打断的原因..."></textarea>
    </div>
    <button class="btn btn-primary" (click)="recordInterruption()">记录打断</button>
  </div>
</div>
