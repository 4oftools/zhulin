<div class="container">
  <div class="card sprint-card">
    <h2>冲刺时间</h2>
    <div class="timer">
      <div class="timer-display">{{ formatTime(elapsedTime) }}</div>
      <p class="timer-label">已用时间</p>
    </div>
    <div class="sprint-info">
      <p>目标时长：30分钟</p>
      <p>保持专注，完成当前任务！</p>
    </div>
    <button class="btn btn-primary btn-large" (click)="completeSprint()">完成冲刺</button>
  </div>
</div>
