<div class="container">
  <div class="card rest-card">
    <h2>休息时间</h2>
    <div class="timer">
      <div class="timer-display">{{ formatTime(elapsedTime) }}</div>
      <p class="timer-label">已用时间</p>
    </div>
    <div class="rest-info">
      <p>目标时长：5分钟</p>
      <p>放松一下，为下一段冲刺做好准备！</p>
    </div>
    <button class="btn btn-primary btn-large" (click)="completeRest()">结束休息</button>
  </div>
</div>
