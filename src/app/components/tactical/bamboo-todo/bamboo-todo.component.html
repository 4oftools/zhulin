<div class="container">
  <div class="header">
    <button class="btn btn-secondary" (click)="router.navigate(['/strategic/bamboos', field?.id])">← 返回竹子</button>
    <h2>竹内待办 - {{ bamboo?.name }}</h2>
  </div>

  <div class="card">
    <h3>待办任务</h3>
    <p class="task-count">共 {{ todoTasks.length }} 个待办任务</p>
    
    <div class="todo-list">
      <div class="todo-item" *ngFor="let task of todoTasks">
        <div class="todo-checkbox">
          <input type="checkbox" [checked]="task.status === 'completed'" 
                 (change)="toggleTaskStatus(task)">
        </div>
        <div class="todo-content">
          <h4 [class.completed]="task.status === 'completed'">{{ task.name }}</h4>
          <p *ngIf="task.description" class="todo-desc">{{ task.description }}</p>
          <div class="todo-meta">
            <span class="badge" [ngClass]="{
              'badge-info': task.status === 'pending',
              'badge-warning': task.status === 'in-progress',
              'badge-success': task.status === 'completed'
            }">
              {{ task.status === 'pending' ? '待办' : task.status === 'in-progress' ? '进行中' : '已完成' }}
            </span>
            <span class="badge badge-info">优先级: {{ task.priority }}</span>
            <span *ngIf="task.estimatedDuration" class="badge badge-warning">
              预计: {{ task.estimatedDuration }}分钟
            </span>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="todoTasks.length === 0" class="empty-state">
      <p>所有任务都已完成！</p>
    </div>
  </div>
</div>
