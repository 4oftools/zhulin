<div class="container">
  <div class="header">
    <h2>活动列表</h2>
  </div>

  <div class="card">
    <h3>常规任务列表</h3>
    <p class="task-count">共 {{ regularTasks.length }} 个待办任务</p>
    
    <div class="tasks-list">
      <div class="task-item" *ngFor="let task of regularTasks">
        <div class="task-info">
          <h4>{{ task.name }}</h4>
          <p *ngIf="task.description" class="task-desc">{{ task.description }}</p>
          <div class="task-meta">
            <span class="badge badge-info">优先级: {{ task.priority }}</span>
            <span *ngIf="task.estimatedDuration" class="badge badge-warning">
              预计: {{ task.estimatedDuration }}分钟
            </span>
            <ng-container *ngIf="getBambooForTask(task) as taskInfo">
              <span class="badge badge-success">
                {{ taskInfo.bamboo.name }}
              </span>
            </ng-container>
          </div>
        </div>
        <div class="task-actions">
          <a [routerLink]="['/strategic/tasks', task.bambooId]" class="btn btn-primary btn-small">查看详情</a>
        </div>
      </div>
    </div>

    <div *ngIf="regularTasks.length === 0" class="empty-state">
      <p>没有待办任务</p>
    </div>
  </div>
</div>
