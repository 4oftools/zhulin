<div class="container">
  <div class="header">
    <button class="btn btn-secondary" (click)="router.navigate(['/strategic/fields', forest?.id])">← 返回竹田</button>
    <h2>竹子管理 - {{ field?.name }}</h2>
    <button class="btn btn-primary" (click)="showAddForm = !showAddForm">
      {{ showAddForm ? '取消' : '新建竹子' }}
    </button>
  </div>

  <div class="card" *ngIf="showAddForm">
    <h3>新建竹子</h3>
    <form (ngSubmit)="addBamboo()">
      <div class="form-group">
        <label>名称：</label>
        <input type="text" [(ngModel)]="newBamboo.name" name="name" required>
      </div>
      <div class="form-group">
        <label>开始日期：</label>
        <input type="date" [value]="newBamboo.startDate | date:'yyyy-MM-dd'" 
               (input)="newBamboo.startDate = $any($event.target).valueAsDate" required>
      </div>
      <div class="form-group">
        <label>结束日期：</label>
        <input type="date" [value]="newBamboo.endDate | date:'yyyy-MM-dd'" 
               (input)="newBamboo.endDate = $any($event.target).valueAsDate" required>
      </div>
      <div class="form-group">
        <label>描述：</label>
        <textarea [(ngModel)]="newBamboo.description" name="description"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">创建</button>
    </form>
  </div>

  <div class="bamboos-list">
    <div class="card" *ngFor="let bamboo of bamboos">
      <div class="card-header">
        <h3>{{ bamboo.name }}</h3>
        <button class="btn btn-danger btn-small" (click)="deleteBamboo(bamboo.id)">删除</button>
      </div>
      <p class="date-range">
        {{ bamboo.startDate | date:'yyyy-MM-dd' }} - {{ bamboo.endDate | date:'yyyy-MM-dd' }}
      </p>
      <p *ngIf="bamboo.description" class="description">{{ bamboo.description }}</p>
      <div class="stats">
        <span>任务数：{{ (bamboo.tasks || []).length }}</span>
      </div>
      <div class="actions">
        <a [routerLink]="['/strategic/tasks', bamboo.id]" class="btn btn-primary">管理任务</a>
        <a [routerLink]="['/tactical/todo', bamboo.id]" class="btn btn-secondary">竹内待办</a>
      </div>
    </div>
  </div>

  <div *ngIf="bamboos.length === 0" class="empty-state">
    <p>还没有创建任何竹子，开始创建第一个吧！</p>
  </div>
</div>
