<div class="container">
  <div class="header">
    <button class="btn btn-secondary" (click)="router.navigate(['/strategic/forests'])">← 返回竹林</button>
    <h2>竹田管理 - {{ forest?.name }}</h2>
    <button class="btn btn-primary" (click)="showAddForm = !showAddForm">
      {{ showAddForm ? '取消' : '新建竹田' }}
    </button>
  </div>

  <div class="card" *ngIf="showAddForm">
    <h3>新建竹田</h3>
    <form (ngSubmit)="addField()">
      <div class="form-group">
        <label>名称：</label>
        <input type="text" [(ngModel)]="newField.name" name="name" required>
      </div>
      <div class="form-group">
        <label>开始日期：</label>
        <input type="date" [value]="newField.startDate | date:'yyyy-MM-dd'" 
               (input)="newField.startDate = $any($event.target).valueAsDate" required>
      </div>
      <div class="form-group">
        <label>结束日期：</label>
        <input type="date" [value]="newField.endDate | date:'yyyy-MM-dd'" 
               (input)="newField.endDate = $any($event.target).valueAsDate" required>
      </div>
      <div class="form-group">
        <label>描述：</label>
        <textarea [(ngModel)]="newField.description" name="description"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">创建</button>
    </form>
  </div>

  <div class="fields-list">
    <div class="card" *ngFor="let field of fields">
      <div class="card-header">
        <h3>{{ field.name }}</h3>
        <button class="btn btn-danger btn-small" (click)="deleteField(field.id)">删除</button>
      </div>
      <p class="date-range">
        {{ field.startDate | date:'yyyy-MM-dd' }} - {{ field.endDate | date:'yyyy-MM-dd' }}
      </p>
      <p *ngIf="field.description" class="description">{{ field.description }}</p>
      <div class="stats">
        <span>竹子数：{{ field.bamboos.length }}</span>
        <span>目标数：{{ field.goals.length }}</span>
      </div>
      <div class="actions">
        <a [routerLink]="['/strategic/bamboos', field.id]" class="btn btn-primary">查看竹子</a>
        <a [routerLink]="['/strategic/goals', field.id]" class="btn btn-secondary">管理目标</a>
      </div>
    </div>
  </div>

  <div *ngIf="fields.length === 0" class="empty-state">
    <p>还没有创建任何竹田，开始创建第一个吧！</p>
  </div>
</div>
