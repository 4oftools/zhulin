<div class="strategic-navigation-container" (click)="closeMenu()">
  <!-- 左侧：竹林列表 -->
  <div class="left-panel">
    <div class="panel-header">
      <h3>竹林</h3>
      <button class="btn-add" (click)="openForestDialog()" title="新建竹林">
        <span appSvgIcon="assets/icons/common/add.svg"></span>
      </button>
    </div>
    <div class="list-container">
      <div 
        class="list-item" 
        [class.active]="router.url.includes('/strategic/forests/' + forest.id)"
        [class.archived]="forest.archived"
        *ngFor="let forest of forests">
        <div class="item-content" (click)="selectForest(forest)">
          <span class="item-icon" appSvgIcon="assets/icons/strategic/forest.svg"></span>
          <div class="item-info">
            <div class="item-name">
              {{ forest.name }}
            </div>
            <div class="item-meta">
              <div class="item-meta-date">
              {{ forest.startDate | date:'yyyy-MM-dd' }} - {{ forest.endDate | date:'yyyy-MM-dd' }}
              </div>
              <div class="item-meta-status">
                <span class="enabled-badge enabled" *ngIf="!forest.archived">已启用</span>
                <span class="enabled-badge archived" *ngIf="forest.archived">已归档</span>
              </div>
            </div>
          </div>
        </div>
        <div class="item-actions">
          <div class="menu-container">
            <button class="btn-menu" (click)="toggleMenu('forest-' + forest.id, $event)" title="更多操作">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </button>
            <div class="dropdown-menu" *ngIf="openMenuId === 'forest-' + forest.id">
              <button class="menu-item" (click)="openForestDialog(forest)">
                <span class="menu-icon" appSvgIcon="assets/icons/common/edit.svg"></span>
                <span>修改</span>
              </button>
              <button class="menu-item" (click)="archiveForest(forest, $event)">
                <span class="menu-icon" [appSvgIcon]="forest.archived ? 'assets/icons/common/unarchive.svg' : 'assets/icons/common/archive.svg'"></span>
                <span>{{ forest.archived ? '取消归档' : '归档' }}</span>
              </button>
              <button class="menu-item danger" (click)="deleteForest(forest, $event)">
                <span class="menu-icon" appSvgIcon="assets/icons/common/delete.svg"></span>
                <span>删除</span>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div *ngIf="forests.length === 0" class="empty-state">
        <p>还没有竹林，点击 + 创建</p>
      </div>
    </div>
  </div>

  <!-- 右侧：竹田面板（通过路由加载） -->
  <div class="fields-section">
    <router-outlet></router-outlet>
  </div>

  <!-- 竹林对话框 -->
  <div class="dialog-overlay" *ngIf="showForestDialog" (click)="closeForestDialog()">
    <div class="dialog-content" (click)="$event.stopPropagation()">
      <div class="dialog-header">
        <h3>{{ isEditingForest ? '修改竹林' : '新建竹林' }}</h3>
        <button class="dialog-close" (click)="closeForestDialog()">×</button>
      </div>
      <div class="dialog-body">
        <div class="form-group">
          <label>名称 <span class="required">*</span></label>
          <input type="text" [(ngModel)]="newForest.name" placeholder="请输入竹林名称" required>
        </div>
        <div class="form-group">
          <label>开始日期 <span class="required">*</span></label>
          <input type="date" [(ngModel)]="newForest.startDate" required>
        </div>
        <div class="form-group">
          <label>结束日期 <span class="required">*</span></label>
          <input type="date" [(ngModel)]="newForest.endDate" required>
        </div>
        <div class="form-group">
          <label>描述</label>
          <textarea [(ngModel)]="newForest.description" placeholder="请输入描述（可选）" rows="3"></textarea>
        </div>
      </div>
      <div class="dialog-footer">
        <button class="btn-cancel" (click)="closeForestDialog()">取消</button>
        <button class="btn-confirm" (click)="addForest()">{{ isEditingForest ? '保存' : '创建' }}</button>
      </div>
    </div>
  </div>

</div>
