<div class="container">
  <div class="header">
    <h2>竹林管理</h2>
    <button class="btn btn-primary" (click)="showAddForm = !showAddForm">
      {{ showAddForm ? '取消' : '新建竹林' }}
    </button>
  </div>

  <div class="card" *ngIf="showAddForm">
    <h3>新建竹林</h3>
    <form (ngSubmit)="addForest()">
      <div class="form-group">
        <label>名称：</label>
        <input type="text" [(ngModel)]="newForest.name" name="name" required>
      </div>
      <div class="form-group">
        <label>开始日期：</label>
        <input type="date" [value]="newForest.startDate | date:'yyyy-MM-dd'" 
               (input)="newForest.startDate = $any($event.target).valueAsDate" required>
      </div>
      <div class="form-group">
        <label>结束日期：</label>
        <input type="date" [value]="newForest.endDate | date:'yyyy-MM-dd'" 
               (input)="newForest.endDate = $any($event.target).valueAsDate" required>
      </div>
      <div class="form-group">
        <label>描述：</label>
        <textarea [(ngModel)]="newForest.description" name="description"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">创建</button>
    </form>
  </div>

  <div class="forests-list">
    <div class="card" *ngFor="let forest of forests">
      <div class="card-header">
        <h3>{{ forest.name }}</h3>
        <button class="btn btn-danger btn-small" (click)="deleteForest(forest.id)">删除</button>
      </div>
      <p class="date-range">
        {{ forest.startDate | date:'yyyy-MM-dd' }} - {{ forest.endDate | date:'yyyy-MM-dd' }}
      </p>
      <p *ngIf="forest.description" class="description">{{ forest.description }}</p>
      <div class="stats">
        <span>竹田数：{{ forest.bambooFields.length }}</span>
      </div>
      <a [routerLink]="['/strategic/fields', forest.id]" class="btn btn-primary">查看竹田</a>
    </div>
  </div>

  <div *ngIf="forests.length === 0" class="empty-state">
    <p>还没有创建任何竹林，开始创建第一个吧！</p>
  </div>
</div>
