  <!-- 第一排竹子 -->
  <line x1="7" y1="8" x2="7" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="7" x2="10" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="8" x2="13" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="7" x2="16" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- 第二排竹子 -->
  <line x1="7" y1="16" x2="7" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="17" x2="10" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="16" x2="13" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="17" x2="16" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
</svg>


