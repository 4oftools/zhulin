<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆形 -->
  <circle cx="60" cy="60" r="58" fill="rgba(255, 255, 255, 0.15)" stroke="rgba(255, 255, 255, 0.3)" stroke-width="2"/>
  
  <!-- 竹子主体 - 左侧 -->
  <g class="bamboo-left">
    <!-- 竹节 -->
    <rect x="35" y="25" width="8" height="70" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 竹节分隔线 -->
    <line x1="33" y1="35" x2="43" y2="35" stroke="currentColor" stroke-width="2"/>
    <line x1="33" y1="50" x2="43" y2="50" stroke="currentColor" stroke-width="2"/>
    <line x1="33" y1="65" x2="43" y2="65" stroke="currentColor" stroke-width="2"/>
    <line x1="33" y1="80" x2="43" y2="80" stroke="currentColor" stroke-width="2"/>
    <!-- 竹叶 -->
    <path d="M 30 30 Q 20 25, 15 30" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 30 30 Q 25 20, 20 15" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- 竹子主体 - 中间 -->
  <g class="bamboo-center">
    <rect x="56" y="20" width="8" height="75" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="54" y1="32" x2="64" y2="32" stroke="currentColor" stroke-width="2"/>
    <line x1="54" y1="47" x2="64" y2="47" stroke="currentColor" stroke-width="2"/>
    <line x1="54" y1="62" x2="64" y2="62" stroke="currentColor" stroke-width="2"/>
    <line x1="54" y1="77" x2="64" y2="77" stroke="currentColor" stroke-width="2"/>
    <path d="M 51 25 Q 40 20, 35 25" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 51 25 Q 46 15, 41 10" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- 竹子主体 - 右侧 -->
  <g class="bamboo-right">
    <rect x="77" y="28" width="8" height="67" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="75" y1="38" x2="85" y2="38" stroke="currentColor" stroke-width="2"/>
    <line x1="75" y1="53" x2="85" y2="53" stroke="currentColor" stroke-width="2"/>
    <line x1="75" y1="68" x2="85" y2="68" stroke="currentColor" stroke-width="2"/>
    <line x1="75" y1="83" x2="85" y2="83" stroke="currentColor" stroke-width="2"/>
    <path d="M 90 33 Q 100 28, 105 33" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 90 33 Q 95 23, 100 18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>

