<div class="app-container" *ngIf="backendConnected && !checkingBackend">
  <header class="app-header">
    <div class="header-content">
      <div class="header-left">
        <div class="logo">
          <i-tabler name="leaf" class="logo-icon"></i-tabler>
          <h1 class="logo-text">竹林工作法</h1>
        </div>
        <nav class="main-nav">
          <a routerLink="/dashboard" routerLinkActive="active">
            <i-tabler name="layout-dashboard" class="nav-icon"></i-tabler>
            <span>大屏展示</span>
          </a>
          <a routerLink="/strategic" routerLinkActive="active">
            <i-tabler name="telescope" class="nav-icon"></i-tabler>
            <span>战略管理</span>
          </a>
          <a routerLink="/tactical" routerLinkActive="active">
            <i-tabler name="list-check" class="nav-icon"></i-tabler>
            <span>战术管理</span>
          </a>
          <a routerLink="/statistics" routerLinkActive="active">
            <i-tabler name="chart-bar" class="nav-icon"></i-tabler>
            <span>详细统计</span>
          </a>
        </nav>
      </div>
      <div class="header-right">
        <button class="btn-settings" (click)="openSettings()" title="设置">
          <i-tabler name="settings" class="settings-icon"></i-tabler>
          <span>设置</span>
        </button>
      </div>
    </div>
  </header>
  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Loading State -->
<div class="loading-overlay" *ngIf="checkingBackend">
  <div class="loading-spinner"></div>
  <p>正在连接服务器...</p>
</div>

<!-- Error State -->
<div class="error-overlay" *ngIf="!checkingBackend && !backendConnected">
  <div class="bamboo-forest-bg">
    <div class="sky-gradient"></div>
    <div class="sun-rays"></div>
    <div class="mist-layer mist-back"></div>
    <div class="bamboo-layer layer-back">
      <div class="stalk b1"></div>
      <div class="stalk b2"></div>
      <div class="stalk b3"></div>
      <div class="stalk b4"></div>
    </div>
    <div class="mist-layer mist-mid"></div>
    <div class="bamboo-layer layer-mid">
      <div class="stalk m1">
        <div class="branch pos-1"></div>
        <div class="branch pos-2"></div>
      </div>
      <div class="stalk m2">
        <div class="branch pos-2"></div>
        <div class="branch pos-3"></div>
      </div>
      <div class="stalk m3">
        <div class="branch pos-1"></div>
        <div class="branch pos-3"></div>
      </div>
    </div>
    <div class="mist-layer mist-front"></div>
    <div class="bamboo-layer layer-front">
      <div class="stalk f1">
        <div class="branch pos-1"></div>
        <div class="branch pos-2"></div>
        <div class="branch pos-3"></div>
      </div>
      <div class="stalk f2">
        <div class="branch pos-2"></div>
        <div class="branch pos-3"></div>
      </div>
    </div>
    <div class="fireflies">
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
      <div class="firefly"></div>
    </div>
  </div>
  <div class="error-content">
    <div class="error-icon-wrapper">
      <i-tabler name="alert-triangle" class="error-icon"></i-tabler>
      <div class="pulse-ring"></div>
    </div>
    <h2>与竹林失去联系</h2>
    <p>迷雾遮挡了视线，正在寻找归途...</p>
    <button class="btn-retry" (click)="retryConnection()">
      <span class="btn-text">重新连接</span>
      <span class="btn-shine"></span>
    </button>
  </div>
</div>

<!-- 设置对话框 -->
<div class="settings-dialog-overlay" *ngIf="showSettingsDialog" (click)="onDialogOverlayClick($event)">
  <div class="settings-dialog" (click)="$event.stopPropagation()">
    <div class="settings-dialog-header">
      <h2>设置</h2>
      <button class="btn-close" (click)="closeSettings()" title="关闭">
        <span>×</span>
      </button>
    </div>
    
    <div class="settings-dialog-content">
      <!-- 自动完成设置 -->
      <div class="settings-section">
        <h3 class="settings-section-title">自动完成设置</h3>
        <div class="settings-item">
          <div class="settings-item-info">
            <label class="settings-item-label">竹子自动完成</label>
            <p class="settings-item-description">当竹子的所有竹节（任务）都完成后，自动将竹子标记为已完成</p>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" 
                   [checked]="settings.autoCompleteBamboo"
                   (change)="onCheckboxChange('autoCompleteBamboo', $event)">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- 提醒设置 -->
      <div class="settings-section">
        <h3 class="settings-section-title">提醒设置</h3>
        <div class="settings-item">
          <div class="settings-item-info">
            <label class="settings-item-label">每日回顾提醒</label>
            <p class="settings-item-description">每天提醒您进行工作回顾</p>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" 
                   [checked]="settings.remindDailyReview"
                   (change)="onCheckboxChange('remindDailyReview', $event)">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-item">
          <div class="settings-item-info">
            <label class="settings-item-label">目标完成提醒</label>
            <p class="settings-item-description">当目标完成时提醒您</p>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" 
                   [checked]="settings.remindGoalCompletion"
                   (change)="onCheckboxChange('remindGoalCompletion', $event)">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-item">
          <div class="settings-item-info">
            <label class="settings-item-label">任务提醒</label>
            <p class="settings-item-description">启用任务提醒功能</p>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" 
                   [checked]="settings.taskReminderEnabled"
                   (change)="onCheckboxChange('taskReminderEnabled', $event)">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- 显示设置 -->
      <div class="settings-section">
        <h3 class="settings-section-title">显示设置</h3>
        <div class="settings-item">
          <div class="settings-item-info">
            <label class="settings-item-label">显示已完成任务</label>
            <p class="settings-item-description">在任务列表中显示已完成的任务</p>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" 
                   [checked]="settings.showCompletedTasks"
                   (change)="onCheckboxChange('showCompletedTasks', $event)">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <!-- 默认设置 -->
      <div class="settings-section">
        <h3 class="settings-section-title">默认设置</h3>
        <div class="settings-item">
          <div class="settings-item-info">
            <label class="settings-item-label">默认竹子周期（天）</label>
            <p class="settings-item-description">创建新竹子时的默认周期天数</p>
          </div>
          <input type="number" 
                 class="settings-input"
                 min="1" 
                 max="30"
                 [value]="settings.defaultBambooDuration"
                 (change)="onNumberChange('defaultBambooDuration', $event)">
        </div>
      </div>
    </div>

    <div class="settings-dialog-footer">
      <button class="btn-reset" (click)="resetSettings()">重置设置</button>
      <button class="btn-close-dialog" (click)="closeSettings()">关闭</button>
    </div>
  </div>
</div>
