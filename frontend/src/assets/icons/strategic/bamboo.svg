<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 连接点 - 三个竹叶的共同起点（顶部） -->
  <circle cx="12" cy="8" r="1.2" fill="currentColor" fill-opacity="0.5"/>
  
  <!-- 第一片竹叶 - 左侧，向下倾斜 -->
  <path d="M12 8 Q9 12 6 15 Q4 17 5 14 Q6 11 8 10 Q10 9 12 8" 
        stroke="currentColor" 
        stroke-width="1.8" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="currentColor" 
        fill-opacity="0.15"/>
  <line x1="12" y1="8" x2="6" y2="15" 
        stroke="currentColor" 
        stroke-width="1.4" 
        stroke-linecap="round"
        opacity="0.6"/>
  
  <!-- 第二片竹叶 - 中间，垂直向下 -->
  <path d="M12 8 Q12 14 12 19 Q12 21 13 20 Q14 19 13 17 Q12 15 12 13 Q12 11 12 8" 
        stroke="currentColor" 
        stroke-width="1.8" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="currentColor" 
        fill-opacity="0.15"/>
  <line x1="12" y1="8" x2="12.5" y2="19" 
        stroke="currentColor" 
        stroke-width="1.4" 
        stroke-linecap="round"
        opacity="0.6"/>
  
  <!-- 第三片竹叶 - 右侧，向下倾斜 -->
  <path d="M12 8 Q15 12 18 15 Q20 17 19 14 Q18 11 16 10 Q14 9 12 8" 
        stroke="currentColor" 
        stroke-width="1.8" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="currentColor" 
        fill-opacity="0.15"/>
  <line x1="12" y1="8" x2="18" y2="15" 
        stroke="currentColor" 
        stroke-width="1.4" 
        stroke-linecap="round"
        opacity="0.6"/>
</svg>
