<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- 竹田 - 区域划分 -->
  <g>
    <!-- 田地网格 -->
    <rect x="10" y="15" width="25" height="25" fill="none" stroke="white" stroke-width="2.5" rx="2"/>
    <rect x="45" y="15" width="25" height="25" fill="none" stroke="white" stroke-width="2.5" rx="2"/>
    <rect x="10" y="50" width="25" height="15" fill="none" stroke="white" stroke-width="2.5" rx="2"/>
    <rect x="45" y="50" width="25" height="15" fill="none" stroke="white" stroke-width="2.5" rx="2"/>
    <!-- 每块田地的竹子 -->
    <line x1="20" y1="20" x2="20" y2="35" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="19" y1="25" x2="21" y2="25" stroke="white" stroke-width="1.5"/>
    <line x1="55" y1="20" x2="55" y2="35" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="54" y1="25" x2="56" y2="25" stroke="white" stroke-width="1.5"/>
    <line x1="20" y1="55" x2="20" y2="60" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="55" y1="55" x2="55" y2="60" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>

