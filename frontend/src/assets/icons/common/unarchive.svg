<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 打开的档案盒主体 -->
  <rect x="2" y="5" width="12" height="9" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <!-- 打开的档案盒盖子（向上打开） -->
  <path d="M2 5L8 2L14 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <path d="M2 5L8 1L14 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 向上箭头表示取出 -->
  <path d="M8 7L8 11M6 9L8 7L10 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 档案盒标签 -->
  <rect x="5" y="9" width="6" height="1.5" rx="0.5" fill="currentColor" opacity="0.6"/>
</svg>
