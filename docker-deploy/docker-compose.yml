services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: zhulin-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=mysql
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/zhulin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy
    networks:
      - zhulin-network
    restart: always

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: zhulin-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - zhulin-network
    restart: always

  db:
    image: mysql:8.0
    container_name: zhulin-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=zhulin
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - zhulin-network
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  db_data:

networks:
  zhulin-network:
    driver: bridge
