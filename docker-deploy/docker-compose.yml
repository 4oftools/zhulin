# 竹林全栈编排：MySQL + Spring Boot + Nginx(前端+API 反代)
# 使用方式：在 docker-deploy 目录执行 docker compose up -d --build
# 可选：复制 .env.example 为 .env 后修改密码等变量

name: zhulin

services:
  db:
    image: mysql:8.0
    container_name: zhulin-db
    # 不映射 3306 到宿主机，避免与本机已运行的 MySQL 冲突；仅 Compose 网络内可通过服务名 db:3306 访问
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zhulin}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - zhulin-network
    restart: unless-stopped
    healthcheck:
      # 使用容器内环境变量，与 MYSQL_ROOT_PASSWORD 始终一致
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: zhulin-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-zhulin}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      ZHULIN_DEMO_DATA: ${ZHULIN_DEMO_DATA:-true}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - zhulin-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: zhulin-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - zhulin-network
    restart: unless-stopped

volumes:
  db_data:

networks:
  zhulin-network:
    driver: bridge
